<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paralegal Toolkit – Bates Stamp</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px 20px;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1d1d1f;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }
    .header { margin-bottom: 20px; }
    .header__title {
      margin: 0;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1d1d1f;
    }
    .header__sub {
      margin: 4px 0 0;
      font-size: 13px;
      color: #6e6e73;
    }
    .main { margin-bottom: 20px; }
    .desc {
      margin: 0 0 20px;
      font-size: 14px;
      color: #424245;
      line-height: 1.45;
    }
    .file-input { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    .btn:active { transform: scale(0.99); }
    .btn--primary {
      background: #0071e3;
      color: #fff;
    }
    .btn--primary:hover { background: #0077ed; }
    .footer {
      padding-top: 16px;
      border-top: 1px solid #e5e5ea;
      font-size: 12px;
      color: #86868b;
      line-height: 1.4;
    }
    .status {
      margin-top: 12px;
      font-size: 13px;
      color: #424245;
    }
    .status--error { color: #c5221f; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="header__title">Paralegal Toolkit</h1>
    <p class="header__sub">Bates Stamp</p>
  </header>
  <main class="main">
    <p class="desc">Select a PDF to add Bates numbers. The viewer opens in a new tab—stamp, set your options, and download. All processing stays on your device.</p>
    <input type="file" id="file-input" accept="application/pdf" class="file-input" aria-label="Choose PDF file" />
    <button type="button" id="choose-btn" class="btn btn--primary">Choose PDF file</button>
  </main>
  <p id="status" class="status" hidden aria-live="polite"></p>
  <footer class="footer">Processed locally. No data is sent to any server.</footer>
  <script type="module" src="scripts/popup.js"></script>
</body>
</html>
